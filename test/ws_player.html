<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebSocket FMP4 Player</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #eee; margin: 2rem; }
    video { width: 640px; background: #000; display: block; margin: 1rem 0; }
    input { width: 400px; padding: 4px; font-family: monospace; }
    button { padding: 4px 12px; margin-left: 4px; cursor: pointer; }
    #log { background: #111; padding: 1rem; max-height: 200px; overflow-y: auto; font-size: 12px; white-space: pre; }
  </style>
</head>
<body>
  <h3>WebSocket FMP4/FLV/TS Player</h3>
  <div>
    <input id="url" value="ws://localhost:8080/ws/live/test.mp4" />
    <button onclick="start()">Connect</button>
    <button onclick="stop()">Disconnect</button>
  </div>
  <video id="video" controls autoplay muted></video>
  <div id="log"></div>

  <script>
    const video = document.getElementById('video');
    const logEl = document.getElementById('log');
    let ws, mediaSource, sourceBuffer, queue = [], appending = false;

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      logEl.textContent += `[${ts}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function stop() {
      if (ws) { ws.close(); ws = null; }
      log('Disconnected');
    }

    function start() {
      stop();
      const url = document.getElementById('url').value;
      const isMp4 = url.endsWith('.mp4');

      if (!isMp4) {
        log('Note: MSE playback only works with .mp4 (fMP4). For .flv/.ts, this page will just log received bytes.');
      }

      ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        log(`Connected to ${url}`);
        if (isMp4) initMSE();
      };

      ws.onmessage = (e) => {
        const bytes = new Uint8Array(e.data);
        log(`Received ${bytes.length} bytes`);
        if (isMp4 && sourceBuffer) {
          queue.push(bytes);
          flush();
        }
      };

      ws.onerror = (e) => log(`Error: ${e.type}`);
      ws.onclose = (e) => log(`Closed: code=${e.code} reason=${e.reason}`);
    }

    function initMSE() {
      mediaSource = new MediaSource();
      video.src = URL.createObjectURL(mediaSource);

      mediaSource.addEventListener('sourceopen', () => {
        log('MSE sourceopen');
        try {
          sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.64001f,mp4a.40.2"');
          sourceBuffer.addEventListener('updateend', flush);
          sourceBuffer.addEventListener('error', (e) => log(`SourceBuffer error: ${e}`));
          log('SourceBuffer created (H.264 + AAC)');
        } catch (e) {
          log(`addSourceBuffer failed: ${e.message}`);
        }
      });
    }

    function flush() {
      if (!sourceBuffer || appending || queue.length === 0) return;
      if (sourceBuffer.updating) return;
      appending = true;
      try {
        sourceBuffer.appendBuffer(queue.shift());
      } catch (e) {
        log(`appendBuffer error: ${e.message}`);
      }
      appending = false;
    }
  </script>
</body>
</html>
