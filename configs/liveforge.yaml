server:
  name: "streamserver-01"
  log_level: info
  drain_timeout: 30s

tls:
  cert_file: ""
  key_file: ""

limits:
  max_streams: 0
  max_subscribers_per_stream: 0
  max_connections: 0
  max_bitrate_per_stream: 0
  rate_limit:
    enabled: false
    rate: 50      # requests per second per IP
    burst: 100    # max burst per IP

rtmp:
  enabled: true
  listen: ":1935"
  chunk_size: 4096
  # skip_tracker:
  #   max_count: 3
  #   window: 60s

rtsp:
  enabled: true
  listen: ":8554"
  rtp_port_range: [10000, 20000]
  # skip_tracker:
  #   max_count: 3
  #   window: 60s

http_stream:
  enabled: true
  listen: ":8080"
  cors: true
  hls:
    segment_duration: 6
    playlist_size: 5
  dash:
    segment_duration: 6
    playlist_size: 30
  llhls:
    enabled: true
    part_duration: 0.2
    segment_count: 4
    container: "fmp4"

websocket:
  enabled: false
  listen: ":8080"
  path: "/ws/{stream}.{format}"

webrtc:
  enabled: true
  listen: ":8443"
  ice_servers:
    - urls: ["stun:stun.l.google.com:19302"]
  udp_port_range: [20000, 30000]
  candidates: []
  gcc:
    enabled: true
    initial_bitrate: 2000000
    min_bitrate: 100000
    max_bitrate: 10000000

srt:
  enabled: true
  listen: ":6000"
  latency: 120
  # passphrase: ""
  # pbkeylen: 0
  # skip_tracker:
  #   max_count: 3
  #   window: 60s

sip:
  enabled: false
  listen: ":5060"
  transport: ["udp", "tcp"]

stream:
  gop_cache: true
  gop_cache_num: 1
  audio_cache_ms: 1000
  ring_buffer_size: 1024
  idle_timeout: 30s
  no_publisher_timeout: 15s
  slow_consumer:
    enabled: true
    lag_warn_ratio: 0.5
    lag_drop_ratio: 0.75
    lag_critical_ratio: 0.9
    lag_recover_ratio: 0.5
    ewma_alpha: 0.3
    send_time_ratio: 2.0
  simulcast:
    enabled: false
    auto_pause_layer: true
    layers:
      - rid: h
        max_bitrate: 2500000
      - rid: l
        max_bitrate: 500000
  feedback:
    default_mode: auto
    auto_thresholds:
      passthrough_max: 1
      aggregate_max: 5

auth:
  enabled: false
  publish:
    mode: "none"
    token:
      secret: "${AUTH_JWT_SECRET}"
      algorithm: HS256
    callback:
      url: ""
      timeout: 3s
  subscribe:
    mode: "none"
    token:
      secret: "${AUTH_JWT_SECRET}"
  api:
    bearer_token: "${API_TOKEN}"

notify:
  http:
    enabled: false
    endpoints: []
  websocket:
    enabled: false
    path: /api/v1/ws/notify
  alive_interval: 10s

cluster:
  forward:
    enabled: false
    targets: []
    schedule_url: ""
    schedule_priority: schedule_first
    schedule_timeout: 3s
    retry_max: 5
    retry_interval: 3s
  origin:
    enabled: false
    servers: []
    schedule_url: ""
    schedule_priority: schedule_first
    schedule_timeout: 3s
    idle_timeout: 30s
    retry_max: 3
    retry_delay: 2s

record:
  enabled: false
  stream_pattern: "live/*"
  format: flv
  path: "/data/record/{date}/{stream}_{time}.{ext}"
  segment:
    mode: duration
    duration: 30m
    max_size: 512MB
  on_file_complete:
    url: ""

metrics:
  enabled: false
  listen: ":9090"
  path: "/metrics"

api:
  enabled: true
  listen: ":8090"
  auth:
    bearer_token: "${API_TOKEN}"
  console:
    username: "admin"
    password: "admin"
