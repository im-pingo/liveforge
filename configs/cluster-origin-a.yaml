server:
  name: "origin-node-a"
  log_level: info
  drain_timeout: 10s

rtmp:
  enabled: true
  listen: ":1935"
  chunk_size: 4096

http_stream:
  enabled: true
  listen: ":8080"
  cors: true

stream:
  gop_cache: true
  gop_cache_num: 1
  audio_cache_ms: 1000
  ring_buffer_size: 1024
  idle_timeout: 30s
  no_publisher_timeout: 30s

cluster:
  forward:
    enabled: false
  origin:
    enabled: false

api:
  enabled: true
  listen: ":8090"
  console:
    username: "admin"
    password: "admin"
