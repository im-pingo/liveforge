server:
  name: "srt-node-b"
  log_level: info
  drain_timeout: 10s

rtmp:
  enabled: true
  listen: ":1936"
  chunk_size: 4096

srt:
  enabled: true
  listen: ":6001"
  latency: 120

http_stream:
  enabled: true
  listen: ":8081"
  cors: true

webrtc:
  enabled: true
  listen: ":8444"
  ice_lite: true
  ice_servers:
    - urls: ["stun:stun.l.google.com:19302"]
  udp_port_range: [30500, 31000]
  candidates: []

stream:
  gop_cache: true
  gop_cache_num: 1
  audio_cache_ms: 1000
  ring_buffer_size: 1024
  idle_timeout: 30s
  no_publisher_timeout: 15s

cluster:
  forward:
    enabled: false
  origin:
    enabled: false

api:
  enabled: true
  listen: ":8091"
  console:
    username: "admin"
    password: "admin"
